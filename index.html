<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深东项目管理器</title>
<style>
:root {
  --bg:#0f0f14;--card:#1a1a24;--border:#2a2a3a;
  --text:#e0e0e0;--muted:#777;--accent:#6c5ce7;
  --green:#34d399;--red:#f87171;--yellow:#fbbf24;--orange:#fb923c;
  --blue:#60a5fa;--pink:#f472b6;--radius:12px;font-size:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;user-select:none;overflow-y:auto}
::-webkit-scrollbar{width:7px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:380px;max-width:92vw;text-align:center}
.login-card h1{font-size:1.5rem;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,#8b9cff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-card .sub{font-size:0.7rem;color:var(--muted);margin-bottom:28px}
.login-card .fld{margin-bottom:14px;text-align:left}
.login-card .fld label{display:block;font-size:0.66rem;color:var(--muted);margin-bottom:4px}
.login-card .fld select,.login-card .fld input{width:100%;padding:11px 14px;background:#12121a;border:1px solid #333;border-radius:8px;color:var(--text);font-size:0.85rem;font-family:inherit;outline:none;transition:border-color .2s}
.login-card .fld select:focus,.login-card .fld input:focus{border-color:var(--accent)}
.login-card .err{color:var(--red);font-size:0.7rem;min-height:20px;margin-bottom:8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 18px;border:1px solid #444;background:#1e1e2a;color:#ccc;border-radius:8px;cursor:pointer;font-size:0.75rem;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn:hover{background:#2a2a3a;border-color:#555}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}.btn-primary:hover{background:#7c6cf0}
.btn-danger{border-color:#5a3030;color:var(--red)}.btn-danger:hover{background:#3a2020}
.btn-orange{border-color:#5a4020;color:var(--orange);background:#2a2010}.btn-orange:hover{background:#3a3018}
.btn-green{border-color:#205030;color:var(--green);background:#102018}.btn-green:hover{background:#183020}
.btn-blue{border-color:#204060;color:var(--blue);background:#102030}.btn-blue:hover{background:#182838}
.btn-pink{border-color:#502040;color:var(--pink);background:#201018}.btn-pink:hover{background:#301828}
.btn-xs{padding:3px 9px;font-size:0.62rem}

.toggle-switch{position:relative;display:inline-flex;align-items:center;gap:10px;cursor:pointer;font-size:.78rem;color:var(--text)}
.toggle-switch input{position:absolute;opacity:0;width:0;height:0}
.toggle-track{width:44px;height:24px;background:#333;border-radius:12px;transition:all .25s;position:relative}
.toggle-track::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:#888;border-radius:50%;transition:all .25s}
.toggle-switch input:checked+.toggle-track{background:var(--accent)}
.toggle-switch input:checked+.toggle-track::after{left:23px;background:#fff}

.app{max-width:1150px;margin:0 auto;padding:20px 28px;display:none}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:14px 24px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);flex-wrap:wrap;gap:12px}
.header-left h1{font-size:1.35rem;font-weight:700;background:linear-gradient(135deg,#8b9cff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-left .date{font-size:0.68rem;color:var(--muted);margin-top:2px}
.header-right{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.user-info{display:flex;align-items:center;gap:6px;background:#14141e;padding:6px 12px;border-radius:8px;border:1px solid #333}
.user-info .uname{font-size:0.82rem;font-weight:600;color:var(--text)}
.role-badge{font-size:0.6rem;padding:2px 7px;border-radius:3px;font-weight:600;white-space:nowrap}
.role-badge.manager{background:#2a1040;color:#a78bfa}.role-badge.member{background:#102a20;color:var(--green)}.role-badge.outsource{background:#302010;color:var(--orange)}
.view-toggle{display:flex;background:#14141e;border-radius:8px;overflow:hidden;border:1px solid #333}
.view-toggle button{padding:6px 14px;border:none;background:transparent;color:#999;font-size:0.7rem;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.view-toggle button.active{background:var(--accent);color:#fff;font-weight:600}
.view-toggle button:hover:not(.active){color:#ccc;background:#1e1e2a}

.stats-bar{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;margin-bottom:16px}
.stat-card{padding:12px 14px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);text-align:center}
.stat-card .num{font-size:1.5rem;font-weight:700;color:#8b9cff;line-height:1.1}
.stat-card .label{font-size:0.6rem;color:var(--muted);margin-top:3px}
.stat-card.done .num{color:var(--green)}.stat-card.pomo .num{color:var(--orange)}

.task-slots{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.task-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .25s;position:relative}
.task-card.dragging{opacity:.35;transform:scale(.98)}
.task-card.drag-target{border-color:var(--accent)!important}
.task-card.drag-target::before{content:'';position:absolute;top:-2px;left:8px;right:8px;height:4px;background:var(--accent);border-radius:0 0 4px 4px;z-index:5}
.task-row{cursor:grab}
.task-card.done{opacity:.42;border-color:#222}
.task-card.done .task-title-text{text-decoration:line-through;color:#666}
.task-row{display:flex;align-items:center;gap:10px;padding:14px 20px;transition:background .12s}
.task-row:hover{background:#1f1f2c}
.cb-wrap{flex-shrink:0;width:22px;height:22px;cursor:pointer;position:relative}
.cb-wrap input{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2}
.cb-box{width:22px;height:22px;border:2px solid #555;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .18s;font-size:.85rem;color:transparent}
.cb-wrap input:checked+.cb-box{background:var(--green);border-color:var(--green);color:#0f0f14}
.priority-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.priority-dot.high{background:var(--red)}.priority-dot.medium{background:var(--yellow)}.priority-dot.low{background:var(--green)}
.task-info{flex:1;min-width:0}
.task-title-text{font-size:.85rem;font-weight:600;color:#e8e8e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{display:flex;gap:10px;margin-top:3px;font-size:.64rem;color:var(--muted);flex-wrap:wrap;align-items:center}
.task-meta span{display:inline-flex;align-items:center;gap:3px}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:.58rem;font-weight:600;white-space:nowrap}
.tag-daily{background:#203040;color:var(--blue)}.tag-assigned{background:#302010;color:var(--orange)}.tag-outsource{background:#302818;color:#d4a574}.tag-pending{background:#2a3020;color:var(--yellow)}.tag-approved{background:#102820;color:var(--green)}.tag-pomo{background:#1a1008;color:var(--orange)}.tag-private{background:#301028;color:var(--pink)}
.task-actions{display:flex;gap:5px;flex-shrink:0;align-items:center}
.expand-icon{width:18px;text-align:center;color:#666;font-size:.65rem;transition:transform .25s;flex-shrink:0}
.expand-icon.open{transform:rotate(90deg)}
.subtask-panel{border-top:1px solid #252530;background:#13131c;max-height:0;overflow:hidden;transition:max-height .3s}
.subtask-panel.open{max-height:6000px}
.subtask-row{display:flex;align-items:center;gap:8px;padding:8px 16px 8px 50px;border-bottom:1px solid #1c1c28;transition:background .12s;flex-wrap:wrap}
.subtask-row:hover{background:#181824}
.subtask-row.done{opacity:.38}.subtask-row.done .subtask-name{text-decoration:line-through;color:#555}
.subtask-row.my-task{background:#0a1a0a;border-left:3px solid var(--green)}.subtask-row.my-task:hover{background:#0d1d0d}
.subtask-row.others-task{opacity:.55}.subtask-row.others-task:hover{opacity:.72}
.subtask-left{display:flex;align-items:center;gap:8px;flex:1;min-width:200px}
.subtask-name{font-size:.76rem;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.subtask-meta{display:flex;align-items:center;gap:7px;font-size:.6rem;color:#666;flex-shrink:0;flex-wrap:wrap}
.subtask-right{display:flex;align-items:center;gap:4px;flex-shrink:0;flex-wrap:wrap}
.pomo-timer{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;font-weight:700;color:var(--orange);padding:4px 10px;background:#1a1008;border-radius:5px;border:1px solid #3a2810;white-space:nowrap}
.pomo-timer.running{animation:pulse 1.5s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.add-sub-row{display:flex;align-items:center;gap:6px;padding:8px 16px 8px 50px;flex-wrap:wrap}
.add-sub-row input,.add-sub-row select{padding:6px 10px;background:#1a1a24;border:1px solid #333;border-radius:6px;color:#ccc;font-size:.7rem;font-family:inherit;outline:none}
.add-sub-row input:focus,.add-sub-row select:focus{border-color:var(--accent)}
.add-sub-row .si-name{flex:1;min-width:120px}.add-sub-row .si-est{width:70px}
.chk-mini{display:inline-flex;align-items:center;gap:2px;font-size:.62rem;color:#999;cursor:pointer;white-space:nowrap}
.chk-mini input{width:auto;margin:0;accent-color:var(--accent)}
.assignee-panel{display:none;flex-wrap:wrap;gap:4px 10px;padding:6px 10px;background:#14141e;border-radius:6px;border:1px solid #252530;width:100%;margin-top:4px}
.assignee-panel.show{display:flex}
.assignee-cb{display:inline-flex;align-items:center;gap:3px;font-size:.62rem;color:#bbb;cursor:pointer;white-space:nowrap}
.assignee-cb input[type=checkbox]{width:13px;height:13px;accent-color:var(--accent);margin:0}
.sub-edit-row{display:flex;align-items:center;gap:6px;padding:8px 16px 8px 50px;border-bottom:1px solid #1c1c28;background:#1a1a28;flex-wrap:wrap}
.sub-edit-row input,.sub-edit-row select{padding:6px 10px;background:#12121a;border:1px solid #444;border-radius:5px;color:#ccc;font-size:.7rem;font-family:inherit;outline:none}
.sub-edit-row .se-name{width:150px}.sub-edit-row .se-est{width:70px}
.assignee-edit-panel{display:none;flex-wrap:wrap;gap:4px 10px;padding:6px 10px;background:#10101a;border-radius:5px;border:1px solid #333;width:100%;margin-top:4px}
.assignee-edit-panel.show{display:flex}
.empty-state{text-align:center;padding:60px 20px;color:#444;font-size:.78rem}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:999}
.modal-bg.show{display:flex}
.modal-box{background:var(--card);border:1px solid #333;border-radius:16px;padding:24px;width:500px;max-width:92vw;animation:zoomIn .2s;max-height:90vh;overflow-y:auto}
@keyframes zoomIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-box h3{font-size:1rem;margin-bottom:14px;color:var(--text)}
.modal-box .fld{margin-bottom:10px}
.modal-box .fld label{display:block;font-size:.64rem;color:var(--muted);margin-bottom:3px}
.modal-box .fld input,.modal-box .fld select{width:100%;padding:9px 12px;background:#12121a;border:1px solid #333;border-radius:8px;color:var(--text);font-size:.8rem;font-family:inherit;outline:none;transition:border-color .2s}
.modal-box .fld input:focus,.modal-box .fld select:focus{border-color:var(--accent)}
.modal-box .fld-row{display:flex;gap:10px}.modal-box .fld-row .fld{flex:1}
.modal-box .mb{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.modal-box .sec{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #252530}
.modal-box .sec:last-child{border-bottom:none;margin-bottom:0}
.modal-box .hint{font-size:.6rem;color:#666;margin-top:4px}
.modal-box .setting-desc{font-size:.62rem;color:var(--muted);margin-top:4px}

.team-member-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#14141e;border-radius:6px;margin-bottom:6px;border:1px solid #252530}
.team-member-row .name{flex:1;font-size:.82rem;color:var(--text)}
.team-member-row .role-tag{font-size:.58rem;padding:2px 6px;border-radius:3px;font-weight:600}
.team-member-row .role-tag.member{background:#102a20;color:var(--green)}
.team-member-row .role-tag.outsource{background:#302010;color:var(--orange)}
.team-add-row{display:flex;gap:8px;margin-top:10px}
.team-add-row input{flex:1;padding:8px 12px;background:#12121a;border:1px solid #333;border-radius:6px;color:var(--text);font-size:.78rem;font-family:inherit;outline:none}
.team-add-row select{padding:8px;background:#12121a;border:1px solid #333;border-radius:6px;color:var(--text);font-size:.75rem;font-family:inherit;outline:none}

.focus-view{display:none}
.focus-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:14px 24px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);flex-wrap:wrap;gap:12px}
.focus-header .focus-title{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#34d399,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.focus-header .focus-sub{font-size:.68rem;color:var(--muted)}
.focus-list{display:flex;flex-direction:column;gap:8px}
.focus-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:grab;transition:all .15s}
.focus-card:hover{border-color:#444;background:#1e1e2a}
.focus-card.focus-submitted{border-left:3px solid var(--yellow)}
.focus-card.dragging{opacity:.3;transform:scale(.97)}
.focus-card.drag-target{border-color:var(--green)!important;border-style:dashed}
.focus-card .fn{flex:1;min-width:0}
.focus-card .fn .focus-name{font-size:.78rem;color:#e0e0e0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.focus-card .fn .focus-meta{font-size:.58rem;color:#555;margin-top:1px}
.focus-card .fa{display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap}
.focus-empty{text-align:center;padding:80px 20px;color:#444;font-size:.82rem;line-height:2}
.focus-empty .big-icon{font-size:3rem;margin-bottom:12px}

.pomo-overlay{position:fixed;inset:0;background:rgba(10,10,18,.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:990}
.pomo-overlay.show{display:flex}
.pomo-overlay .big-time{font-size:7rem;font-weight:300;color:var(--orange);font-variant-numeric:tabular-nums;letter-spacing:2px}
.pomo-overlay .big-time.done{color:var(--green);animation:none}
.pomo-overlay .big-task{font-size:.85rem;color:var(--muted);margin-top:12px;max-width:80%;text-align:center}
.pomo-overlay .big-play{width:140px;height:140px;border-radius:50%;border:3px solid var(--orange);background:rgba(251,146,60,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:3.5rem;color:var(--orange);transition:all .2s;margin-top:30px}
.pomo-overlay .big-play:hover{background:rgba(251,146,60,.3);transform:scale(1.05)}
.pomo-overlay .big-close{position:fixed;bottom:40px;right:40px;width:48px;height:48px;border:1px solid #444;border-radius:50%;background:#1a1a24;color:#888;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;transition:all .15s}
.pomo-overlay .big-close:hover{background:#2a2a34;color:#ccc}
.pomo-btns{display:flex;gap:24px;margin-top:18px}
.pomo-btns button{padding:8px 22px;border-radius:8px;border:1px solid #444;background:#1a1a24;color:#aaa;font-size:.75rem;font-family:inherit;cursor:pointer;transition:all .15s}
.pomo-btns button:hover{background:#2a2a34;color:#fff}
.mini-pomo{position:fixed;top:12px;right:12px;background:var(--card);border:1px solid #333;border-radius:var(--radius);padding:16px 20px;z-index:99;display:none;min-width:200px}
.mini-pomo.show{display:block}
.mini-pomo .mini-time{font-size:2.5rem;font-weight:300;color:var(--orange);text-align:center}
.mini-pomo .mini-time.done{color:var(--green)}
.mini-pomo .mini-task{font-size:.7rem;color:var(--muted);text-align:center;margin-top:6px}
.mini-pomo .mini-close{position:absolute;top:6px;right:10px;background:none;border:none;color:#555;cursor:pointer;font-size:1rem}

.drop-overlay{position:fixed;inset:0;background:rgba(108,92,231,.15);border:3px dashed var(--accent);display:none;align-items:center;justify-content:center;z-index:950}
.drop-overlay.show{display:flex}.drop-overlay.active{background:rgba(52,211,153,.2);border-color:var(--green)}
.drop-zone{text-align:center}.drop-zone .icon{font-size:4rem}.drop-zone .text{font-size:1.2rem;font-weight:700;color:var(--text);margin-top:12px}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap" style="display:none">
<div class="login-card">
<h1>深东项目管理器</h1>
<div class="sub">专注 · 协作 · 高效</div>
<div class="fld">
<label>选择身份</label>
<select id="loginSel" onchange="onLoginSel()"></select>
</div>
<div class="fld" id="loginPwdFld">
<label>密码（留空则无密码登录）</label>
<input type="password" id="loginPwd" placeholder="无密码可直接登录" onkeydown="if(event.key==='Enter')login()">
</div>
<div class="err" id="loginErr"></div>
<button class="btn btn-primary" onclick="login()" style="width:100%;justify-content:center;padding:12px">进入</button>
</div>
</div>

<div class="app" id="appWrap">
<div class="header">
<div class="header-left">
<h1>深东项目管理器</h1>
<div class="date" id="td"></div>
</div>
<div class="header-right">
<div class="view-toggle">
<button class="active" onclick="switchView(1)">项目看板</button>
<button onclick="switchView(2)">专注模式</button>
</div>
<div class="user-info">
<span class="uname" id="hdrName"></span>
<span class="role-badge" id="hdrRole" style="font-size:.6rem;padding:2px 7px;border-radius:3px;font-weight:600"></span>
</div>
<button class="btn btn-sm" onclick="openTeamMgmt()" id="btnTeam" style="display:none">👥</button>
<button class="btn btn-sm" onclick="openSettings()">⚙ 设置</button>
<button class="btn btn-sm btn-danger" onclick="logout()">退出</button>
</div>
</div>

<div id="view1">
<div class="stats-bar">
<div class="stat-card"><div class="num" id="tc">0</div><div class="label">项目/待办</div></div>
<div class="stat-card"><div class="num" id="mc" style="color:var(--green)">0</div><div class="label">我的待办</div></div>
<div class="stat-card done"><div class="num" id="dc">0</div><div class="label">已完成</div></div>
<div class="stat-card pomo"><div class="num" id="pc">0</div><div class="label">番茄🍅</div></div>
</div>
<div class="task-slots" id="ts"></div>
<div class="empty-state" id="eh" style="display:none">还没有任务项目<br><br><button class="btn btn-primary" onclick="add()">+ 创建第一个项目</button></div>
<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">
<button class="btn btn-primary" onclick="add()">+ 新建项目</button>
<button class="btn" onclick="exp()">📤 导出JSON</button>
<button class="btn" onclick="imp()">📥 导入JSON</button>
<button class="btn btn-danger" onclick="clr()">🧹 清理已完成</button>
</div>
</div>

<div class="focus-view" id="view2">
<div class="focus-header">
<div>
<div class="focus-title">🎯 专注模式</div>
<div class="focus-sub" id="focusDate"></div>
</div>
<div style="display:flex;gap:8px;align-items:center">
<button class="btn btn-sm" onclick="switchView(1)">← 返回看板</button>
</div>
</div>
<div class="focus-list" id="focusList"></div>
<div class="focus-empty" id="focusEmpty">
<div class="big-icon">✨</div>
<div>暂无待办任务</div>
<div style="font-size:.68rem;color:#555">在项目看板中添加待办后，这里会显示你的专属任务</div>
</div>
</div>
</div>

<div class="modal-bg" id="md">
<div class="modal-box">
<h3 id="mt">新建项目</h3>
<div class="fld"><label>项目名称</label><input id="en" placeholder="输入项目名称"></div>
<div class="fld-row">
<div class="fld"><label>预估时间</label><input id="ee" placeholder="如：2h / 半天"></div>
<div class="fld"><label>优先级</label><select id="ep"><option value="high">🔴 高</option><option value="medium" selected>🟡 中</option><option value="low">🟢 低</option></select></div>
</div>
<div class="fld"><label>截止日期</label><input id="ed" placeholder="如：5/20"></div>
<div class="fld"><label class="chk-mini"><input type="checkbox" id="eDly"> 每日循环任务</label></div>
<div class="mb"><button class="btn" onclick="cls()">取消</button><button class="btn btn-primary" id="sb" onclick="sv()">添加</button></div>
</div>
</div>

<div class="modal-bg" id="tm">
<div class="modal-box">
<h3 id="tmMgName">团队管理 - 深东</h3>
<div id="tmList"></div>
<div class="team-add-row" style="margin-top:16px">
<input id="tmNewName" placeholder="成员姓名">
<select id="tmNewRole">
<option value="member">成员</option>
<option value="outsource">外包单位</option>
</select>
<button class="btn btn-primary btn-sm" onclick="addMember()">添加</button>
</div>
<div class="sec" style="margin-top:16px">
<div class="fld"><label>修改管理员密码</label><input type="text" id="tmMgPwd" placeholder="新密码（留空=无密码）"></div>
<button class="btn btn-sm" onclick="changeMgPwd()">更新管理员密码</button>
</div>
<div class="mb"><button class="btn" onclick="closeTeamMgmt()">返回</button></div>
</div>
</div>

<div class="modal-bg" id="st">
<div class="modal-box">
<h3>⚙ 设置</h3>

<div class="sec">
<label class="toggle-switch" style="margin-bottom:8px">
<input type="checkbox" id="stPrivacy" onchange="savePrivacyToggle()">
<span class="toggle-track"></span>
<span>隐私保护</span>
</label>
<div class="setting-desc">开启后，标记为「个人待办」的项目将不会随 JSON 导出</div>
</div>

<div class="sec">
<div class="fld"><label>修改密码（留空=无密码）</label></div>
<div class="fld-row">
<input id="stOld" placeholder="旧密码" style="flex:1;padding:8px;background:#12121a;border:1px solid #333;border-radius:6px;color:#ccc;font-size:.75rem;font-family:inherit;outline:none">
<input id="stNew1" placeholder="新密码" type="text" style="flex:1;padding:8px;background:#12121a;border:1px solid #333;border-radius:6px;color:#ccc;font-size:.75rem;font-family:inherit;outline:none">
<input id="stNew2" placeholder="确认新密码" type="text" style="flex:1;padding:8px;background:#12121a;border:1px solid #333;border-radius:6px;color:#ccc;font-size:.75rem;font-family:inherit;outline:none">
</div>
<button class="btn btn-sm" onclick="changePwdFromSettings()" style="margin-top:8px">修改密码</button>
<div style="color:var(--red);font-size:.68rem;min-height:20px" id="stPwdErr"></div>
</div>

<div class="sec">
<div class="fld"><label>番茄钟时长（分钟）</label><input id="stPomoMins" type="number" min="1" max="120"></div>
<div class="mb"><button class="btn btn-primary btn-sm" onclick="savePomoSettings()">保存</button></div>
</div>

<div class="sec">
<div class="fld"><label>导出文件名前缀</label><input id="stExpName" placeholder="如：深东项目备份"></div>
<div class="fld"><label>导出文件夹</label><input id="stExpPath" readonly placeholder="点击下方按钮选择"></div>
<div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap">
<button class="btn btn-sm" onclick="pickExportFolder()">📁 选择文件夹</button>
<button class="btn btn-sm" onclick="setupAutoStart()">🚀 配置开机启动</button>
</div>
</div>

<div class="mb"><button class="btn" onclick="closeSettings()">关闭</button></div>
</div>
</div>

<div class="pomo-overlay" id="pomoOverlay">
<div class="big-time" id="pomoBigTime">25:00</div>
<div class="big-task" id="pomoBigTask"></div>
<div class="big-play" id="pomoBigPlay" style="display:none" onclick="restartPomoFromOverlay()">▶</div>
<div class="pomo-btns">
<button onclick="closePomoOverlay(false)">停止番茄</button>
<button onclick="closePomoOverlay(true)">返回看板</button>
</div>
</div>

<div class="mini-pomo" id="miniPomo">
<div class="mini-time" id="miniTime">25:00</div>
<div class="mini-task" id="miniTask"></div>
<button class="mini-close" onclick="closeMiniPomo(false)">✕</button>
</div>

<div class="drop-overlay" id="dropOverlay">
<div class="drop-zone">
<div class="icon">📂</div>
<div class="text">拖放 JSON 文件到此处导入</div>
</div>
</div>

<div class="modal-bg" id="impDlg">
<div class="modal-box" style="text-align:center">
<h3 id="impTitle">导入数据</h3>
<div id="impInfo" style="margin:12px 0;font-size:.8rem;color:#ccc"></div>
<div id="impBtns"></div>
<div style="margin-top:12px"><button class="btn btn-sm" onclick="cancelImp()">取消</button></div>
</div>
</div>

<script>
const KEY_T='xl_tm_tasks',KEY_C='xl_tm_cfg',KEY_I='xl_tm_identity';
let tsks=[],cfg={},me='',ei=-1,dragIdx=-1,curView=1;
let pomoTask=null,timerId=null,impQueue=null,expFolderHandle=null,activePomos={};

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function esc(s){if(!s)return'';let d=document.createElement('div');d.textContent=s;return d.innerHTML}
function ymd(){let d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0')}
function tdy(){let d=new Date();return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 星期'+['日','一','二','三','四','五','六'][d.getDay()]}
function nw(){let d=new Date(),p=n=>('0'+n).slice(-2);return(d.getMonth()+1)+'/'+d.getDate()+' '+p(d.getHours())+':'+p(d.getMinutes())}

async function hashPwd(pw){if(!pw)return'';let e=new TextEncoder().encode(pw),h=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}

function isManager(){return me===cfg.manager}
function getPwdFor(name){if(name===cfg.manager)return cfg.managerPwd||'';let m=cfg.members.find(m=>m.name===name);return m?m.pwd||'':''}
function setPwdFor(name,hash){if(name===cfg.manager){cfg.managerPwd=hash;return}let m=cfg.members.find(m=>m.name===name);if(m)m.pwd=hash}

let DEF_PWD='8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92';

function defaultCfg(){
  return {
    manager:'深东',
    managerPwd:DEF_PWD,
    members:[
      {name:'东哥哥',role:'member',pwd:DEF_PWD},
      {name:'老蔡',role:'member',pwd:''},
      {name:'小北哥',role:'member',pwd:''},
      {name:'孙博文',role:'member',pwd:''},
      {name:'灯光',role:'outsource',pwd:''},
      {name:'施工图',role:'outsource',pwd:''},
      {name:'其他',role:'outsource',pwd:''}
    ],
    pomoMins:25,
    expName:'深东项目备份',
    expPath:'',
    autoStart:false,
    privacyMode:false
  };
}

function allPeople(){let list=[cfg.manager];cfg.members.forEach(m=>{if(!list.includes(m.name))list.push(m.name)});return list}
function getRole(name){if(name===cfg.manager)return'管理员';let m=cfg.members.find(m=>m.name===name);return m?m.role==='outsource'?'外包单位':'伙伴':'未知'}
function getRoleClass(name){if(name===cfg.manager)return'manager';let m=cfg.members.find(m=>m.name===name);return m&&m.role==='outsource'?'outsource':'member'}
function isInAssignees(s,name){if(!name)return false;if(!s.assignees||!s.assignees.length)return false;return s.assignees.includes(name)}

function ldCfg(){try{let r=localStorage.getItem(KEY_C);if(r)cfg=JSON.parse(r)}catch(e){cfg=null};if(!cfg||!cfg.manager||!Array.isArray(cfg.members)||!!cfg.DEF_HASH)cfg=defaultCfg();
  if(cfg.manager!=='深东'){if(cfg.manager&&cfg.manager!=='深东'){if(!cfg.members.find(m=>m.name===cfg.manager))cfg.members.push({name:cfg.manager,role:'member',pwd:''})}cfg.manager='深东'}
  if(!cfg.members.find(m=>m.name==='东哥哥'))cfg.members.push({name:'东哥哥',role:'member',pwd:DEF_PWD});
  ['老蔡','小北哥','孙博文','灯光','施工图','其他'].forEach(n=>{if(!cfg.members.find(m=>m.name===n))cfg.members.push({name:n,role:n==='灯光'||n==='施工图'||n==='其他'?'outsource':'member',pwd:''})});
  cfg.members=cfg.members.filter(m=>!['东','外包单位','深东'].includes(m.name));
  if(!cfg.managerPwd)cfg.managerPwd=DEF_PWD;
  let dg=cfg.members.find(m=>m.name==='东哥哥');if(dg&&!dg.pwd)dg.pwd=DEF_PWD;
  cfg.privacyMode=!!cfg.privacyMode;
  if(cfg.members)cfg.members.forEach(m=>{if(typeof m.pwd==='undefined')m.pwd='';if(!m.role)m.role='member'})
}
function svCfg(){localStorage.setItem(KEY_C,JSON.stringify(cfg))}
function popLoginNames(){let sel=document.getElementById('loginSel');sel.innerHTML=allPeople().map(n=>'<option value="'+esc(n)+'">'+esc(n)+' ('+getRole(n)+')</option>').join('')}

function onLoginSel(){
  let name=document.getElementById('loginSel').value;
  let sh=getPwdFor(name);
  let pwdFld=document.getElementById('loginPwdFld');
  let pwdInput=document.getElementById('loginPwd');
  if(!sh){pwdFld.style.opacity='.4';pwdInput.value='';pwdInput.placeholder='无需密码'}else{pwdFld.style.opacity='1';pwdInput.placeholder='请输入密码'}
}

async function login(){
  let sel=document.getElementById('loginSel'),name=sel.value,pwd=document.getElementById('loginPwd').value,err=document.getElementById('loginErr');
  if(!name)return;
  let sh=getPwdFor(name);
  if(!sh){
    me=name;localStorage.setItem(KEY_I,me);showApp();return
  }
  if(!pwd){err.textContent='请输入密码';return}
  if((await hashPwd(pwd))!==sh){err.textContent='密码错误';return}
  me=name;err.textContent='';localStorage.setItem(KEY_I,me);showApp()
}
function logout(){me='';localStorage.removeItem(KEY_I);document.getElementById('loginWrap').style.display='flex';document.getElementById('appWrap').style.display='none';popLoginNames();onLoginSel()}

function showApp(){
  document.getElementById('loginWrap').style.display='none';document.getElementById('appWrap').style.display='block';
  document.getElementById('td').textContent=tdy();document.getElementById('focusDate').textContent=tdy();
  updateHeaders();ldTasks();rdr();renderFocus()
}

let DEF_HASH='';
if(typeof DEF_HASH==='undefined')DEF_HASH='';

function updateHeaders(){
  document.getElementById('hdrName').textContent=me;
  let rb=document.getElementById('hdrRole');
  rb.textContent=me===cfg.manager?'管理员':getRole(me);
  rb.className='role-badge '+getRoleClass(me);
  document.getElementById('btnTeam').style.display=isManager()?'inline-flex':'none';
  document.getElementById('td').textContent=tdy();document.getElementById('focusDate').textContent=tdy()
}

function switchView(v){
  curView=v;
  document.getElementById('view1').style.display=v===1?'block':'none';
  document.getElementById('view2').style.display=v===2?'block':'none';
  let btns=document.querySelectorAll('.view-toggle button');
  btns.forEach((b,i)=>{b.classList.toggle('active',(i===0&&v===1)||(i===1&&v===2))});
  if(v===2)renderFocus()
}

function ldTasks(){
  try{let r=localStorage.getItem(KEY_T);if(r)tsks=JSON.parse(r)}catch(e){tsks=[]};if(!Array.isArray(tsks))tsks=[];
  let today=ymd();
  tsks.forEach(t=>{
    if(!t.id)t.id=genId();
    if(t.dl&&t.lcd!==today&&t.done){t.done=false;t.at='';if(t.sb)t.sb.forEach(s=>{s.done=false;s.at=''})};
    if(t.sb)t.sb.forEach(s=>{
      if(!s.id)s.id=genId();
      if(s.prun&&!s.done)s.prun=false;
      if(s.assignedTo&&!s.assignees){s.assignees=[s.assignedTo];delete s.assignedTo}
      if(!s.assignees&&s.assignedTo){s.assignees=[s.assignedTo];delete s.assignedTo}
    });
    if(!t.hasOwnProperty('private'))t.private=false
  });
  svs()
}
function svs(){localStorage.setItem(KEY_T,JSON.stringify(tsks))}

function rdr(){
  let c=document.getElementById('ts'),h=document.getElementById('eh');
  if(!tsks.length){c.innerHTML='';h.style.display='block'}else{h.style.display='none';c.innerHTML=tsks.map((t,i)=>cd(t,i)).join('')};stt()
}

function cd(t,i){
  let cc=t.done?' done':'',oc=t.exp?' open':'',sh='';
  if(t.sb&&t.sb.length)sh=t.sb.map((s,si)=>subHtml(s,i,si)).join('');
  let at2=t.at?'<span>实际:'+esc(t.at)+'</span>':'',ds2=t.de?'<span>截止:'+esc(t.de)+'</span>':'';
  let sd=0,sn=0;if(t.sb){sn=t.sb.length;sd=t.sb.filter(s=>s.done).length}
  let myPending=0;if(t.sb)myPending=t.sb.filter(s=>isInAssignees(s,me)&&!s.done&&s.status!=='submitted').length;
  let capt='<span>'+sd+'/'+sn+'项</span>';
  if(myPending>0)capt+='<span style="color:var(--green);font-weight:600">我:'+myPending+'</span>';
  let dlyTag=t.dl?'<span class="tag tag-daily">每日</span>':'';
  let privTag=t.private?'<span class="tag tag-private">个人待办</span>':'';
  return '<div class="task-card'+cc+'" id="tcard_'+i+'"><div class="task-row" draggable="true" ondragstart="dragStart(event,'+i+')" ondragover="dragOver(event,'+i+')" ondragleave="dragLeave(event,'+i+')" ondrop="drop(event,'+i+')" ondragend="dragEnd(event)" onclick="te('+i+')">'+
    '<span class="cb-wrap" onclick="event.stopPropagation()"><input type="checkbox" '+(t.done?'checked':'')+' onchange="tt('+i+')"><span class="cb-box">&#10003;</span></span>'+
    '<span class="priority-dot '+(t.pr||'medium')+'"></span>'+
    '<span class="task-info"><div class="task-title-text">'+esc(t.nm||'未命名')+'</div>'+
    '<div class="task-meta"><span>预估:'+esc(t.et||'-')+'</span>'+at2+ds2+capt+dlyTag+privTag+'</div></span>'+
    '<span class="task-actions">'+
    '<button class="btn btn-xs btn-pink" onclick="event.stopPropagation();toggleTaskPrivate('+i+')" title="'+(t.private?'取消个人待办':'设为个人待办')+'">🔒</button>'+
    '<button class="btn btn-xs" onclick="event.stopPropagation();edt('+i+')">编辑</button>'+
    '<button class="btn btn-xs btn-danger" onclick="event.stopPropagation();dt('+i+')">删除</button></span>'+
    '<span class="expand-icon'+oc+'">&#9654;</span></div>'+
    '<div class="subtask-panel'+oc+'">'+sh+addSubRowHtml(i)+'</div></div>';
}

function toggleTaskPrivate(i){
  tsks[i].private=!tsks[i].private;svs();rdr()
}
function toggleSubPrivate(ti,si){
  tsks[ti].sb[si].private=!tsks[ti].sb[si].private;svs();rdr();renderFocus()
}
function joinSub(ti,si){
  let s=tsks[ti].sb[si];
  if(!s.assignees)s.assignees=[];
  if(!s.assignees.includes(me))s.assignees.push(me);
  if(s.status!=='submitted')s.status='assigned';s.sub=false;
  svs();rdr();renderFocus()
}
function leaveSub(ti,si){
  let s=tsks[ti].sb[si];
  if(!s.assignees||s.assignees.length<=1){s.assignees=null;s.status=null;s.sub=false}else{s.assignees=s.assignees.filter(a=>a!==me)}
  svs();rdr();renderFocus()
}

function addSubRowHtml(i){
  let allP=allPeople(),cbHtml=allP.map(n=>'<label class="assignee-cb"><input type="checkbox" value="'+esc(n)+'"> '+esc(n)+'</label>').join('');
  return '<div class="add-sub-row"><input class="si-name" id="sn_'+i+'" placeholder="+ 待办项" onkeydown="if(event.key===\'Enter\')as('+i+')"><input class="si-est" id="se_'+i+'" placeholder="预估"><label class="chk-mini"><input type="checkbox" id="sdel_'+i+'" onchange="tgCD('+i+')">协作</label><label class="chk-mini"><input type="checkbox" id="spom_'+i+'">🍅</label><button class="btn btn-xs btn-primary" onclick="as('+i+')">添加</button></div>'+
    '<div class="assignee-panel" id="ap_'+i+'">'+cbHtml+'</div>'
}
function tgCD(i){let e=document.getElementById('ap_'+i);if(e)e.style.display=document.getElementById('sdel_'+i).checked?'flex':'none'}

function subHtml(s,ti,si){
  if(s._ed)return subEditHtml(s,ti,si);
  let isM=isInAssignees(s,me),isO=s.assignees&&s.assignees.length&&!isInAssignees(s,me);
  let rc='subtask-row';
  if(s.done)rc+=' done';else if(isM)rc+=' my-task';else if(isO)rc+=' others-task';

  let privTag=s.private?'<span class="tag tag-private">个人待办</span>':'';
  let asgnTags='';
  if(s.assignees&&s.assignees.length>0){
    asgnTags=s.assignees.map(a=>'<span class="tag '+(getRole(a)==='外包单位'?'tag-outsource':'tag-assigned')+'">'+esc(a)+'</span>').join('');
  }

  if(s.done){
    let ex='';if(s.pc)ex='<span>'+s.pc+'🍅</span>';
    return'<div class="'+rc+'"><span class="subtask-left"><span class="cb-wrap" onclick="event.stopPropagation()"><input type="checkbox" checked onchange="undoSub('+ti+','+si+')"><span class="cb-box">&#10003;</span></span><span class="subtask-name">'+esc(s.nm)+'</span><span class="subtask-meta"><span>预估:'+esc(s.et||'-')+'</span><span>实际:'+esc(s.at||'')+'</span>'+ex+'</span>'+privTag+asgnTags+'</span><span class="subtask-right">'+(isM||isManager()?'<button class="btn btn-xs btn-pink" onclick="event.stopPropagation();toggleSubPrivate('+ti+','+si+')" title="'+(s.private?'取消个人待办':'设为个人待办')+'">🔒</button><button class="btn btn-xs" onclick="event.stopPropagation();startEditSub('+ti+','+si+')">编辑</button><button class="btn btn-xs" onclick="event.stopPropagation();ds('+ti+','+si+')">✕</button>':'')+'</span></div>';
  }

  let l='',r='<span class="subtask-right">';

  if(s.assignees&&s.assignees.length&&s.status==='submitted'){
    l='<span class="subtask-left"><span class="cb-wrap"><span class="cb-box" style="opacity:.35;cursor:default">&#10003;</span></span><span class="subtask-name">'+esc(s.nm)+'</span><span class="subtask-meta"><span>预估:'+esc(s.et||'-')+'</span>'+asgnTags+' <span class="tag tag-pending">已提交</span></span>'+privTag+'</span>';
    if(isManager()){
      r+='<button class="btn btn-xs btn-pink" onclick="event.stopPropagation();toggleSubPrivate('+ti+','+si+')" title="'+(s.private?'取消个人待办':'设为个人待办')+'">🔒</button>';
      r+='<button class="btn btn-xs btn-green" onclick="event.stopPropagation();approve('+ti+','+si+')">确认完成</button>';
      r+='<button class="btn btn-xs" onclick="event.stopPropagation();reject('+ti+','+si+')">发回修改</button>';
      r+='<button class="btn btn-xs" onclick="event.stopPropagation();startEditSub('+ti+','+si+')">编辑</button>';
      r+='<button class="btn btn-xs" onclick="event.stopPropagation();ds('+ti+','+si+')">✕</button>';
    }else if(isM){
      r+='<button class="btn btn-xs btn-pink" onclick="event.stopPropagation();toggleSubPrivate('+ti+','+si+')" title="'+(s.private?'取消个人待办':'设为个人待办')+'">🔒</button>';
      r+='<button class="btn btn-xs btn-blue" onclick="event.stopPropagation();withdrawSubmission('+ti+','+si+')">撤回</button>';
      r+='<button class="btn btn-xs" onclick="event.stopPropagation();startEditSub('+ti+','+si+')">编辑</button>';
      r+='<button class="btn btn-xs" onclick="event.stopPropagation();leaveSub('+ti+','+si+')">退出</button>';
      r+='<button class="btn btn-xs" onclick="event.stopPropagation();ds('+ti+','+si+')">✕</button>';
    }else{
      r+='<button class="btn btn-xs btn-blue" onclick="event.stopPropagation();joinSub('+ti+','+si+')">加入</button>';
      r+='<button class="btn btn-xs btn-pink" onclick="event.stopPropagation();toggleSubPrivate('+ti+','+si+')" title="'+(s.private?'取消个人待办':'设为个人待办')+'">🔒</button>';
    }
  }else if(s.assignees&&s.assignees.length&&s.status==='assigned'){
    l='<span class="subtask-left"><span class="cb-wrap"><span class="cb-box" style="opacity:.3;cursor:default">-</span></span><span class="subtask-name">'+esc(s.nm)+'</span><span class="subtask-meta"><span>预估:'+esc(s.et||'-')+'</span>'+asgnTags+'</span>'+privTag+'</span>';
    if(isM){
      if(s.pom){if(s.prun){let rem=calcRem(s);r+='<span class="pomo-timer running" id="stpt_'+ti+'_'+si+'">'+fmtTime(rem)+'</span>'}else r+='<button class="btn btn-xs btn-orange" onclick="event.stopPropagation();startPomo('+ti+','+si+')">▶ '+pomoLabel()+'</button>';r+='<span class="tag tag-pomo">'+(s.pc||0)+'</span>'}
      r+='<button class="btn btn-xs btn-pink" onclick="event.stopPropagation();toggleSubPrivate('+ti+','+si+')" title="'+(s.private?'取消个人待办':'设为个人待办')+'">🔒</button>';
      r+='<button class="btn btn-xs btn-orange" onclick="event.stopPropagation();submitWork('+ti+','+si+')">标记完成</button>';
      r+='<button class="btn btn-xs" onclick="event.stopPropagation();startEditSub('+ti+','+si+')">编辑</button>';
      r+='<button class="btn btn-xs" onclick="event.stopPropagation();leaveSub('+ti+','+si+')">退出</button>';

function fmtTime(s){let m=Math.floor(s/60),sec=s%60;return m+':'+('0'+sec).slice(-2)}

function stt(){

function startTimer(){
  if(timerId)return;
  timerId=setInterval(()=>{
    let running=false;
    for(let i=0;i<tsks.length;i++){let sb=tsks[i].sb||[];for(let j=0;j<sb.length;j++){let s=sb[j];
      if(s.prun&&!s.done){running=true;let rem=calcRem(s);
        let stEl=document.getElementById('stpt_'+i+'_'+j);if(stEl)stEl.textContent=fmtTime(rem);
        let fpEl=document.getElementById('fpt_'+i+'_'+j);if(fpEl)fpEl.textContent=fmtTime(rem);
        let bo=document.getElementById('pomoBigTime');if(bo&&!bo.classList.contains('done'))bo.textContent=fmtTime(rem);
        let mt=document.getElementById('miniTime');if(mt&&!mt.classList.contains('done'))mt.textContent=fmtTime(rem);
        if(rem<=0){s.pc=(s.pc||0)+1;s.prun=false;s.pstart=0;svs();rdr();renderFocus();
          pomoOverlayDone();miniPomoDone();
        }}}}
    if(!running){clearInterval(timerId);timerId=null}
  },1000)
}

function dragLeave(e,i){let card=document.getElementById('tcard_'+i);if(card)card.classList.remove('drag-target')}

function drop(e,i){e.preventDefault();document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('dragging','drag-target'));if(i===dragIdx||dragIdx<0)return;let item=tsks.splice(dragIdx,1)[0];tsks.splice(i,0,item);dragIdx=-1;svs();rdr()}

function clr(){
  let ch=false;tsks=tsks.filter(t=>{if(t.dl&&t.done)return true;if(t.done){ch=true;return false}return true});
  tsks.forEach(t=>{if(t.sb&&t.sb.length){let ol=t.sb.length;t.sb=t.sb.filter(s=>{if(!s.done)return true;if(!isManager()&&!isInAssignees(s,me))return true;ch=true;return false});if(t.sb.length!==ol)ch=true}});
  if(!ch){alert('没有可清理的已完成项目');return};svs();rdr();renderFocus()
}

async function exp(){
  let ename=cfg.expName||'深东项目备份';
  let fname=ename+'_'+ymd()+'.json';
  let exportData;
  if(cfg.privacyMode){
    exportData=tsks.map(t=>{
      let ct={...t};
      if(ct.private)return null;
      if(ct.sb&&ct.sb.length){ct.sb=ct.sb.filter(s=>!s.private);if(!ct.sb.length)delete ct.sb}
      if(!ct.sb||ct.sb.length===0){if(ct.done)return null}
      return ct
    }).filter(t=>t!==null);
    if(!exportData.length){alert('隐私保护已开启，当前无可导出的非隐私任务');return}
  }else{
    exportData=tsks;
  }
  let json=JSON.stringify(exportData,null,2);
  let blob=new Blob([json],{type:'application/json'});

  if(expFolderHandle){
    try{
      let fh=await expFolderHandle.getFileHandle(fname,{create:true});
      let w=await fh.createWritable();
      await w.write(blob);
      await w.close();
      alert('已导出到：'+fname);
      return;
    }catch(e){expFolderHandle=null}
  }
  let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;a.click()
}

function imp(){
  let inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(){let f=this.files[0];if(!f)return;let r=new FileReader();
    r.onload=function(){try{let d=JSON.parse(r.result);if(!Array.isArray(d))throw new Error();
      impQueue=d;
      d.forEach(t=>{if(t.sb)t.sb.forEach(s=>{if(s.assignedTo&&!s.assignees){s.assignees=[s.assignedTo];delete s.assignedTo}})});
      if(isManager()){showImpDialog(d.length)}else{doImportAdd(d)}
    }catch(e){alert('导入失败：文件格式不正确')}};
    r.readAsText(f)
  };inp.click()
}
function showImpDialog(cnt){
  let dlg=document.getElementById('impDlg');
  document.getElementById('impTitle').textContent='导入数据';
  document.getElementById('impInfo').innerHTML='检测到 <b>'+cnt+'</b> 条项目记录<br>请选择导入方式：';
  document.getElementById('impBtns').innerHTML=
    '<button class="btn btn-primary" onclick="doImportOverwrite()" style="font-size:.85rem;padding:10px 24px">📋 覆盖导入</button>'+
    '<button class="btn btn-green" onclick="doImportAdd(impQueue)" style="font-size:.85rem;padding:10px 24px">➕ 添加导入</button>';
  dlg.classList.add('show')
}
function doImportOverwrite(){
  tsks=[...impQueue];tsks.forEach(t=>{if(!t.id)t.id=genId();if(t.sb)t.sb.forEach(s=>{if(!s.id)s.id=genId();if(s.assignedTo&&!s.assignees){s.assignees=[s.assignedTo];delete s.assignedTo}})});
  svs();rdr();renderFocus();cancelImp();alert('覆盖导入成功！共 '+impQueue.length+' 条项目')
}
function doImportAdd(data){
  let addT=0,addS=0,existIds=new Set();
  tsks.forEach(t=>{existIds.add(t.id);if(t.sb)t.sb.forEach(s=>existIds.add(s.id))});
  data.forEach(t=>{
    if(!t.id)t.id=genId();
    if(!existIds.has(t.id)){
      if(!t.done){
        if(t.sb)t.sb.forEach(s=>{if(!s.id)s.id=genId();if(s.done)existIds.add(s.id)});
        tsks.push(t);addT++;existIds.add(t.id);
      }
    }else{
      let ct=tsks.find(et=>et.id===t.id);
      if(ct&&ct.sb&&t.sb){
        t.sb.forEach(s=>{
          if(!s.id)s.id=genId();
          if(s.done)return;
          if(!existIds.has(s.id)){
            let ce=ct.sb.find(es=>es.id===s.id);
            if(!ce){ct.sb.push(s);addS++;existIds.add(s.id)}
          }
        })
      }
    }
  });
  svs();rdr();renderFocus();cancelImp();
  alert('添加导入成功！\n新增 '+addT+' 个项目，'+addS+' 个待办项\n（已完成的未重复添加）')
}
function cancelImp(){document.getElementById('impDlg').classList.remove('show');impQueue=null}

function renderFocus(){
  if(curView!==2)return;
  let list=[],all=document.getElementById('focusEmpty'),c=document.getElementById('focusList');
  tsks.forEach((t,i)=>{
    if(t.sb)t.sb.forEach((s,si)=>{
      if(s.done)return;
      if(isManager()){
        if(isInAssignees(s,me)&&s.status!=='submitted')list.push({s,ti:i,si,type:'mine'});
        if(s.status==='submitted')list.push({s,ti:i,si,type:'submitted'})
      }else{
        if(isInAssignees(s,me))list.push({s,ti:i,si,type:s.status==='submitted'?'submitted':'mine'})
      }
    })
  });
  if(!list.length){all.style.display='block';c.innerHTML='';return};all.style.display='none';
  c.innerHTML=list.map((item,idx)=>focusCard(item,idx)).join('')
}

function focusCard(item,idx){
  let s=item.s,ti=item.ti,si=item.si,type=item.type;
  let cc=type==='submitted'?' focus-submitted':'';
  return'<div class="focus-card'+cc+'" data-idx="'+idx+'" draggable="true" ondragstart="focusDragStart(event,'+idx+')" ondragover="focusDragOver(event,'+idx+')" ondragleave="focusDragLeave(event,'+idx+')" ondrop="focusDrop(event,'+idx+')" ondragend="focusDragEnd(event)"><span class="fn"><div class="focus-name">'+esc(s.nm)+(type==='submitted'?'<span style="color:var(--yellow);font-size:.58rem;margin-left:6px">已提交</span>':'')+'</div>'+
    (s.et?'<div class="focus-meta">'+esc(s.et)+'</div>':'')+'</span>'+
    '<span class="fa">'+
    (type==='submitted'?
      (isManager()?'<button class="btn btn-xs btn-green" onclick="event.stopPropagation();approve('+ti+','+si+')">确认</button><button class="btn btn-xs" onclick="event.stopPropagation();reject('+ti+','+si+')">发回</button>':
       '<button class="btn btn-xs btn-blue" onclick="event.stopPropagation();withdrawSubmission('+ti+','+si+')">撤回</button>')
     :('<button class="btn btn-xs btn-orange" onclick="event.stopPropagation();submitWork('+ti+','+si+')">完成</button>'+
       (s.pom?'<button class="btn btn-xs btn-orange" onclick="event.stopPropagation();startPomo('+ti+','+si+')">▶ '+pomoLabel()+'</button>'+
        '<span class="tag tag-pomo">'+(s.pc||0)+'</span>':
        '<label class="chk-mini" title="开启番茄钟" onclick="event.stopPropagation()"><input type="checkbox" onchange="toggleFocusPom('+ti+','+si+',this.checked)">🍅</label>')
    ))+
    '<button class="btn btn-xs btn-pink" onclick="event.stopPropagation();toggleSubPrivate('+ti+','+si+')" title="'+(s.private?'取消个人待办':'个人待办')+'">🔒</button>'+
    '</span></div>'
}
function toggleFocusPom(ti,si,val){tsks[ti].sb[si].pom=val;svs();rdr();renderFocus()}
let focusDragIdx=-1;
function focusDragStart(e,idx){focusDragIdx=idx;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
function focusDragOver(e,idx){e.preventDefault();if(idx===focusDragIdx)return;e.currentTarget.classList.add('drag-target')}
function focusDragLeave(e,idx){e.currentTarget.classList.remove('drag-target')}
function focusDragEnd(e){document.querySelectorAll('.focus-card').forEach(c=>c.classList.remove('dragging','drag-target'));focusDragIdx=-1}
function focusDrop(e,idx){
  e.preventDefault();
  document.querySelectorAll('.focus-card').forEach(c=>c.classList.remove('dragging','drag-target'));
  if(idx===focusDragIdx||focusDragIdx<0)return;
  reorderFocus(idx);focusDragIdx=-1
}
function reorderFocus(idx){
  if(idx===focusDragIdx||focusDragIdx<0)return;
  let items=[];
  tsks.forEach((t,i)=>{
    if(t.sb)t.sb.forEach((s,si)=>{
      if(s.done)return;
      if(isManager()){
        if(isInAssignees(s,me)&&s.status!=='submitted')items.push({ti:i,si});
        if(s.status==='submitted')items.push({ti:i,si})
      }else{
        if(isInAssignees(s,me))items.push({ti:i,si})
      }
    })
  });
  if(idx>=items.length||focusDragIdx>=items.length)return;
  let src=items[focusDragIdx],tgt=items[idx],srcS=tsks[src.ti].sb[src.si],tgtS=tsks[tgt.ti].sb[tgt.si];
  tsks[src.ti].sb.splice(src.si,1);let newIdx=tsks[tgt.ti].sb.indexOf(tgtS);
  if(newIdx<0)newIdx=tsks[tgt.ti].sb.length;tsks[tgt.ti].sb.splice(newIdx,0,srcS);focusDragIdx=-1;svs();rdr();renderFocus()
}

function openTeamMgmt(){if(!isManager())return;document.getElementById('tmMgName').textContent='团队管理 - 深东';rdrTeamList();document.getElementById('tm').classList.add('show')}
function closeTeamMgmt(){document.getElementById('tm').classList.remove('show');ldCfg();updateHeaders();rdr();renderFocus()}
function rdrTeamList(){
  document.getElementById('tmList').innerHTML=cfg.members.map((m,i)=>{
    let rt=m.role==='outsource'?'<span class="role-tag outsource">外包</span>':'<span class="role-tag member">伙伴</span>';
    return'<div class="team-member-row"><span class="name">'+esc(m.name)+'</span>'+rt+'<button class="btn btn-xs" onclick="resetPwd('+i+')">重置密码</button><button class="btn btn-xs btn-danger" onclick="removeMember('+i+')">移除</button></div>'
  }).join('')
}
async function addMember(){
  let n=document.getElementById('tmNewName').value.trim();if(!n){alert('请输入姓名');return};
  if(allPeople().includes(n)){alert('已存在');return};
  let role=document.getElementById('tmNewRole').value;
  cfg.members.push({name:n,role:role,pwd:''});svCfg();
  document.getElementById('tmNewName').value='';
  rdrTeamList()
}
function removeMember(i){let nm=cfg.members[i].name;if(!confirm('移除「'+nm+'」？'))return;cfg.members.splice(i,1);svCfg();rdrTeamList();if(me===nm)logout()}
async function resetPwd(i){let nm=cfg.members[i].name;if(!confirm('将「'+nm+'」密码设为空？'))return;cfg.members[i].pwd='';svCfg();rdrTeamList();alert(nm+' 密码已重置为空')}
async function changeMgPwd(){
  let pw=document.getElementById('tmMgPwd').value;
  cfg.managerPwd=await hashPwd(pw);svCfg();document.getElementById('tmMgPwd').value='';
  alert(pw?'管理员密码已更新':'管理员密码已设为空')
}

function openSettings(){
  document.getElementById('stOld').value='';document.getElementById('stNew1').value='';document.getElementById('stNew2').value='';document.getElementById('stPwdErr').textContent='';
  document.getElementById('stPomoMins').value=cfg.pomoMins||25;
  document.getElementById('stExpName').value=cfg.expName||'深东项目备份';
  document.getElementById('stExpPath').value=cfg.expPath||'浏览器默认下载文件夹';
  document.getElementById('stPrivacy').checked=!!cfg.privacyMode;
  document.getElementById('st').classList.add('show')
}
function savePrivacyToggle(){
  cfg.privacyMode=document.getElementById('stPrivacy').checked;svCfg()
}
function closeSettings(){
  let en=document.getElementById('stExpName').value.trim();
  if(en){cfg.expName=en;svCfg()}
  document.getElementById('st').classList.remove('show');ldCfg();rdr();renderFocus()
}

async function pickExportFolder(){
  if(!('showDirectoryPicker'in window)){alert('您的浏览器不支持此功能，请使用 Edge 浏览器');return}
  try{
    expFolderHandle=await window.showDirectoryPicker({mode:'readwrite'});
    cfg.expPath=expFolderHandle.name;svCfg();
    document.getElementById('stExpPath').value=cfg.expPath;
  }catch(e){if(e.name!=='AbortError')alert('选择文件夹失败')}
}

async function setupAutoStart(){
  if(!('showDirectoryPicker'in window)){alert('您的浏览器不支持此功能，请使用 Edge 浏览器\n\n请手动将开机启动脚本放入：\n%APPDATA%\\Microsoft\\Windows\\Start Menu\\Programs\\Startup');return}
  alert('请在弹出的文件夹选择窗口中，粘贴以下路径：\n%APPDATA%\\Microsoft\\Windows\\Start Menu\\Programs\\Startup\n\n然后点击"选择文件夹"');
  try{
    let h=await window.showDirectoryPicker({mode:'readwrite'});
    let bat='@echo off\r\nstart "" msedge --app="file:///'+location.href.replace(/\\/g,'/')+'" --window-size=1200,900\r\nexit\r\n';
    let fh=await h.getFileHandle('深东项目管理器.bat',{create:true});
    let w=await fh.createWritable();
    await w.write(bat);
    await w.close();
    cfg.autoStart=true;svCfg();
    alert('开机启动配置成功！\n下次开机将自动打开深东项目管理器')
  }catch(e){if(e.name!=='AbortError')alert('配置失败，请尝试手动操作')}
}

async function changePwdFromSettings(){
  document.getElementById('stPwdErr').textContent='';
  let old=document.getElementById('stOld').value,n1=document.getElementById('stNew1').value,n2=document.getElementById('stNew2').value;
  let stored=getPwdFor(me);
  if(stored&&!old){document.getElementById('stPwdErr').textContent='当前有密码，请输入旧密码';return}
  if(stored&&(await hashPwd(old))!==stored){document.getElementById('stPwdErr').textContent='旧密码错误';return}
  if(n1!==n2){document.getElementById('stPwdErr').textContent='两次新密码不一致';return}
  let nh=await hashPwd(n1);
  setPwdFor(me,nh);svCfg();
  document.getElementById('stOld').value='';document.getElementById('stNew1').value='';document.getElementById('stNew2').value='';
  alert(n1?'密码修改成功！':'密码已设为空，下次登录无需密码')
}

function savePomoSettings(){
  let v=parseInt(document.getElementById('stPomoMins').value)||25;if(v<1)v=1;if(v>120)v=120;cfg.pomoMins=v;
  let en=document.getElementById('stExpName').value.trim();if(en)cfg.expName=en;
  savePrivacyToggle();svCfg();rdr();renderFocus();alert('设置已保存！番茄钟：'+v+' 分钟')
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){cls();closeTeamMgmt();closeSettings()}});
['md','tm','st'].forEach(id=>{document.getElementById(id).addEventListener('click',function(e){if(e.target===this){if(id==='md')cls();else if(id==='tm')closeTeamMgmt();else closeSettings()}})});

function handleDropFiles(files){
  if(!files||!files.length)return;let f=files[0];
  if(!f.name.toLowerCase().endsWith('.json')){alert('仅支持导入 .json 格式文件');return}
  let r=new FileReader();
  r.onload=function(){try{let d=JSON.parse(r.result);if(!Array.isArray(d))throw new Error();
    d.forEach(t=>{if(t.sb)t.sb.forEach(s=>{if(s.assignedTo&&!s.assignees){s.assignees=[s.assignedTo];delete s.assignedTo}})});
    impQueue=d;
    if(isManager()){showImpDialog(d.length)}else{doImportAdd(d)}
  }catch(e){alert('导入失败：文件格式不正确')}};
  r.readAsText(f)
}

let dropOverlay=document.getElementById('dropOverlay');
document.addEventListener('dragenter',function(e){
  e.preventDefault();
  if(!me)return;
  let items=e.dataTransfer.items||e.dataTransfer.files;
  if((items&&items.length)||(e.dataTransfer.types&&e.dataTransfer.types.includes('Files'))){
    dropOverlay.classList.add('show');
  }
});
dropOverlay.addEventListener('dragenter',function(e){e.preventDefault();dropOverlay.classList.add('active')});
dropOverlay.addEventListener('dragleave',function(e){if(e.target===dropOverlay||e.target.classList.contains('drop-zone')){dropOverlay.classList.remove('active')}});
document.addEventListener('dragover',function(e){e.preventDefault();if(dropOverlay.classList.contains('show')){e.dataTransfer.dropEffect='copy'}});
document.addEventListener('dragleave',function(e){if(e.clientX<=0||e.clientY<=0||e.clientX>=window.innerWidth||e.clientY>=window.innerHeight){dropOverlay.classList.remove('show','active')}});
dropOverlay.addEventListener('drop',function(e){e.preventDefault();dropOverlay.classList.remove('show','active');handleDropFiles(e.dataTransfer.files)});
document.addEventListener('drop',function(e){
  if(e.target===dropOverlay||e.target.closest('.drop-overlay'))return;
  e.preventDefault();dropOverlay.classList.remove('show','active');
  let files=e.dataTransfer.files;if(files&&files.length)handleDropFiles(files)
});

ldCfg();popLoginNames();onLoginSel();
let stored=localStorage.getItem(KEY_I);
if(stored&&stored===cfg.manager){me=stored;showApp()}else if(stored&&getPwdFor(stored)!==undefined){
  let sh=getPwdFor(stored);if(!sh){me=stored;showApp()}else{document.getElementById('loginWrap').style.display='flex';document.getElementById('loginSel').value=stored}
}else{document.getElementById('loginWrap').style.display='flex'}</script>
